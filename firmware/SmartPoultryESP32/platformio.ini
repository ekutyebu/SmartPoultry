[platformio]
src_dir = .
default_envs = esp32dev

[env:esp32dev]
platform = espressif32
board = esp32doit-devkit-v1
framework = arduino
monitor_speed = 115200
; Compile one file at a time to prevent host PC running out of RAM
build_jobs = 1
; -Os: optimize for size (uses less compiler memory than -O2)
; -DHT_NO_DEBOUNCE: suppress DHT library macro conflicts with Config.h
build_flags =
    -Os
    -DDHT_NO_DEBOUNCE

lib_deps =
    adafruit/Adafruit Unified Sensor @ ^1.1.14
    adafruit/DHT sensor library @ ^1.4.6
    madhephaestus/ESP32Servo @ ^3.0.5
    marcoschwartz/LiquidCrystal_I2C @ ^1.1.4
    bblanchon/ArduinoJson @ ^6.21.5
